<text x="84" y="110" fill="#16463F" font-family="Georgia" font-size="18" font-weight="700" text-anchor="start"><tspan x="84" dy="0">Humanity First</tspan></text><text x="84" y="146" fill="#1E1A18" font-family="Georgia" font-size="48" font-weight="700" text-anchor="start"><tspan x="84" dy="0">Brand Direction &amp;</tspan><tspan x="84" dy="64.8">Screen System</tspan></text><text x="84" y="212" fill="#746B64" font-family="Arial" font-size="17" font-weight="400" text-anchor="start"><tspan x="84" dy="0">Editorial warmth meets donor trust. This direction blends impact</tspan><tspan x="84" dy="23.0">storytelling, earthy optimism, and strong calls to action so the</tspan><tspan x="84" dy="23.0">platform feels both human and credible.</tspan></text><rect x="90" y="320" width="560" height="330" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="84" y="310" width="560" height="330" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="116" y="360" fill="#16463F" font-family="Georgia" font-size="24" font-weight="700" text-anchor="start"><tspan x="116" dy="0">Visual Mood</tspan></text><text x="130" y="406" fill="#1E1A18" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="130" dy="0">Warm cream backgrounds instead of generic white.</tspan></text><circle cx="118" cy="400" r="4.5" fill="#C96D47"/><text x="130" y="446" fill="#1E1A18" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="130" dy="0">Deep forest green for trust, action, and stability.</tspan></text><circle cx="118" cy="440" r="4.5" fill="#C96D47"/><text x="130" y="486" fill="#1E1A18" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="130" dy="0">Terracotta and gold accents for energy and hope.</tspan></text><circle cx="118" cy="480" r="4.5" fill="#C96D47"/><text x="130" y="526" fill="#1E1A18" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="130" dy="0">Large editorial headings paired with practical content</tspan><tspan x="130" dy="21.6">cards.</tspan></text><circle cx="118" cy="520" r="4.5" fill="#C96D47"/><text x="130" y="566" fill="#1E1A18" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="130" dy="0">Field-photo panels and proof blocks to keep impact</tspan><tspan x="130" dy="21.6">visible.</tspan></text><circle cx="118" cy="560" r="4.5" fill="#C96D47"/><rect x="712" y="320" width="650" height="330" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="706" y="310" width="650" height="330" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="738" y="360" fill="#16463F" font-family="Georgia" font-size="24" font-weight="700" text-anchor="start"><tspan x="738" dy="0">Palette</tspan></text><rect x="738" y="410" width="120" height="62" rx="18" fill="#16463F" stroke-width="1"/><text x="738" y="502" fill="#1E1A18" font-family="Arial" font-size="15" font-weight="700" text-anchor="start"><tspan x="738" dy="0">Forest</tspan></text><text x="738" y="524" fill="#746B64" font-family="Arial" font-size="13" font-weight="400" text-anchor="start"><tspan x="738" dy="0">#16463F</tspan></text><rect x="918" y="410" width="120" height="62" rx="18" fill="#C96D47" stroke-width="1"/><text x="918" y="502" fill="#1E1A18" font-family="Arial" font-size="15" font-weight="700" text-anchor="start"><tspan x="918" dy="0">Clay</tspan></text><text x="918" y="524" fill="#746B64" font-family="Arial" font-size="13" font-weight="400" text-anchor="start"><tspan x="918" dy="0">#C96D47</tspan></text><rect x="1098" y="410" width="120" height="62" rx="18" fill="#E5C37A" stroke-width="1"/><text x="1098" y="502" fill="#1E1A18" font-family="Arial" font-size="15" font-weight="700" text-anchor="start"><tspan x="1098" dy="0">Gold</tspan></text><text x="1098" y="524" fill="#746B64" font-family="Arial" font-size="13" font-weight="400" text-anchor="start"><tspan x="1098" dy="0">#E5C37A</tspan></text><rect x="738" y="530" width="120" height="62" rx="18" fill="#F5F0E6" stroke-width="1"/><text x="738" y="622" fill="#1E1A18" font-family="Arial" font-size="15" font-weight="700" text-anchor="start"><tspan x="738" dy="0">Cream</tspan></text><text x="738" y="644" fill="#746B64" font-family="Arial" font-size="13" font-weight="400" text-anchor="start"><tspan x="738" dy="0">#F5F0E6</tspan></text><rect x="918" y="530" width="120" height="62" rx="18" fill="#B8C8C1" stroke-width="1"/><text x="918" y="622" fill="#1E1A18" font-family="Arial" font-size="15" font-weight="700" text-anchor="start"><tspan x="918" dy="0">Sage</tspan></text><text x="918" y="644" fill="#746B64" font-family="Arial" font-size="13" font-weight="400" text-anchor="start"><tspan x="918" dy="0">#B8C8C1</tspan></text><rect x="1098" y="530" width="120" height="62" rx="18" fill="#1E1A18" stroke-width="1"/><text x="1098" y="622" fill="#1E1A18" font-family="Arial" font-size="15" font-weight="700" text-anchor="start"><tspan x="1098" dy="0">Ink</tspan></text><text x="1098" y="644" fill="#746B64" font-family="Arial" font-size="13" font-weight="400" text-anchor="start"><tspan x="1098" dy="0">#1E1A18</tspan></text><rect x="90" y="702" width="620" height="450" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="84" y="692" width="620" height="450" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="116" y="740" fill="#16463F" font-family="Georgia" font-size="24" font-weight="700" text-anchor="start"><tspan x="116" dy="0">Typography</tspan></text><text x="116" y="812" fill="#1E1A18" font-family="Georgia" font-size="40" font-weight="700" text-anchor="start"><tspan x="116" dy="0">Stories that move</tspan><tspan x="116" dy="54.0">support.</tspan></text><text x="116" y="880" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="116" dy="0">Editorial headline style for mission moments and</tspan><tspan x="116" dy="21.6">major impact narratives.</tspan></text><line x1="116" y1="920" x2="668" y2="920" stroke="#D8D0C3" stroke-width="1.5" stroke-linecap="round"/><text x="116" y="980" fill="#1E1A18" font-family="Arial" font-size="17" font-weight="400" text-anchor="start"><tspan x="116" dy="0">This body style is designed for trust-building</tspan><tspan x="116" dy="23.0">content: concise, readable, and useful on both</tspan><tspan x="116" dy="23.0">desktop and mobile layouts.</tspan></text><text x="116" y="1060" fill="#746B64" font-family="Arial" font-size="15" font-weight="700" text-anchor="start"><tspan x="116" dy="0">Button / CTA</tspan></text><rect x="116" y="1084" width="140" height="48" rx="24" fill="#16463F" stroke-width="1.5"/><text x="186.0" y="1114" fill="#FFFDF8" font-family="Arial" font-size="15" font-weight="700" text-anchor="middle"><tspan x="186.0" dy="0">Donate Now</tspan></text><rect x="270" y="1084" width="140" height="48" rx="24" fill="#FFFDF8" stroke="#16463F" stroke-width="1.5"/><text x="340.0" y="1114" fill="#16463F" font-family="Arial" font-size="15" font-weight="700" text-anchor="middle"><tspan x="340.0" dy="0">See Projects</tspan></text><rect x="744" y="702" width="618" height="450" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="738" y="692" width="618" height="450" rx="28" fill="#E4ECE9" stroke="#D8D0C3" stroke-width="1"/><text x="770" y="740" fill="#16463F" font-family="Georgia" font-size="24" font-weight="700" text-anchor="start"><tspan x="770" dy="0">Component Direction</tspan></text><rect x="776" y="812" width="170" height="122" rx="24" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="770" y="802" width="170" height="122" rx="24" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="794" y="846" fill="#16463F" font-family="Georgia" font-size="30" font-weight="700" text-anchor="start"><tspan x="794" dy="0">12+</tspan></text><text x="794" y="880" fill="#746B64" font-family="Arial" font-size="14" font-weight="400" text-anchor="start"><tspan x="794" dy="0">Impact sectors</tspan><tspan x="794" dy="18.9">and campaigns</tspan></text><rect x="964" y="812" width="170" height="122" rx="24" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="958" y="802" width="170" height="122" rx="24" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="982" y="846" fill="#16463F" font-family="Georgia" font-size="30" font-weight="700" text-anchor="start"><tspan x="982" dy="0">4k</tspan></text><text x="982" y="880" fill="#746B64" font-family="Arial" font-size="14" font-weight="400" text-anchor="start"><tspan x="982" dy="0">Lives engaged</tspan><tspan x="982" dy="18.9">through</tspan><tspan x="982" dy="18.9">programs</tspan></text><rect x="1152" y="812" width="170" height="122" rx="24" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="1146" y="802" width="170" height="122" rx="24" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="1170" y="846" fill="#16463F" font-family="Georgia" font-size="30" font-weight="700" text-anchor="start"><tspan x="1170" dy="0">92%</tspan></text><text x="1170" y="880" fill="#746B64" font-family="Arial" font-size="14" font-weight="400" text-anchor="start"><tspan x="1170" dy="0">Donation</tspan><tspan x="1170" dy="18.9">clarity target</tspan></text><rect x="776" y="970" width="546" height="144" rx="24" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="770" y="960" width="546" height="144" rx="24" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="800" y="1006" fill="#16463F" font-family="Georgia" font-size="22" font-weight="700" text-anchor="start"><tspan x="800" dy="0">Signature Layout Pattern</tspan></text><text x="800" y="1046" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="800" dy="0">Large narrative block on one side, proof cards or</tspan><tspan x="800" dy="21.6">imagery on the other, then a strong section CTA</tspan><tspan x="800" dy="21.6">underneath.</tspan></text><rect x="72" y="1242" width="1296" height="180" rx="34" fill="#16463F" stroke-width="1"/><text x="110" y="1298" fill="#FFFDF8" font-family="Georgia" font-size="30" font-weight="700" text-anchor="start"><tspan x="110" dy="0">Built to grow with new projects,</tspan><tspan x="110" dy="40.5">partners, and countries.</tspan></text><text x="110" y="1352" fill="#DDE8E4" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="110" dy="0">A digital platform for dignity, transparency, and grassroots</tspan><tspan x="110" dy="21.6">storytelling.</tspan></text><rect x="1190" y="1308" width="160" height="48" rx="24" fill="#FFFDF8" stroke="#16463F" stroke-width="1.5"/><text x="1270.0" y="1338" fill="#16463F" font-family="Arial" font-size="15" font-weight="700" text-anchor="middle"><tspan x="1270.0" dy="0">Request</tspan><tspan x="1270.0" dy="20.2">Partnership</tspan></text>
</svg>
