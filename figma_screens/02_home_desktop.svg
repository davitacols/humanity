<text x="92" y="74" fill="#16463F" font-family="Georgia" font-size="24" font-weight="700" text-anchor="start"><tspan x="92" dy="0">Humanity First</tspan></text><text x="92" y="96" fill="#746B64" font-family="Arial" font-size="14" font-weight="700" text-anchor="start"><tspan x="92" dy="0">Initiative</tspan></text><text x="520" y="78" fill="#16463F" font-family="Arial" font-size="15" font-weight="700" text-anchor="start"><tspan x="520" dy="0">Home</tspan></text><text x="615" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="615" dy="0">About</tspan></text><text x="720" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="720" dy="0">Projects</tspan></text><text x="836" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="836" dy="0">Programs</tspan></text><text x="960" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="960" dy="0">Donate</tspan></text><text x="1064" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="1064" dy="0">Get Involved</tspan></text><rect x="1210" y="50" width="138" height="48" rx="24" fill="#16463F" stroke-width="1.5"/><text x="1279.0" y="80" fill="#FFFDF8" font-family="Arial" font-size="15" font-weight="700" text-anchor="middle"><tspan x="1279.0" dy="0">Donate Now</tspan></text><rect x="72" y="126" width="1296" height="560" rx="40" fill="#FFFDF8" stroke-width="1"/><circle cx="1250" cy="240" r="160" fill="#E5C37A" opacity="0.24"/><circle cx="830" cy="620" r="120" fill="#B8C8C1" opacity="0.22"/><rect x="104" y="164" width="236" height="38" rx="19" fill="#E4ECE9" stroke-width="1"/><text x="222.0" y="188" fill="#16463F" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="222.0" dy="0">Grassroots impact across</tspan><tspan x="222.0" dy="18.9">Africa</tspan></text><text x="104" y="240" fill="#1E1A18" font-family="Georgia" font-size="56" font-weight="700" text-anchor="start"><tspan x="104" dy="0">Humanity, dignity,</tspan><tspan x="104" dy="75.6">and practical hope</tspan><tspan x="104" dy="75.6">in one platform.</tspan></text><text x="104" y="388" fill="#746B64" font-family="Arial" font-size="18" font-weight="400" text-anchor="start"><tspan x="104" dy="0">A mission-led digital home for humanitarian</tspan><tspan x="104" dy="24.3">interventions, donor trust, education access, health</tspan><tspan x="104" dy="24.3">awareness, creative advocacy, and sports development.</tspan></text><rect x="104" y="492" width="150" height="48" rx="24" fill="#16463F" stroke-width="1.5"/><text x="179.0" y="522" fill="#FFFDF8" font-family="Arial" font-size="15" font-weight="700" text-anchor="middle"><tspan x="179.0" dy="0">Donate Now</tspan></text><rect x="270" y="492" width="148" height="48" rx="24" fill="#FFFDF8" stroke="#16463F" stroke-width="1.5"/><text x="344.0" y="522" fill="#16463F" font-family="Arial" font-size="15" font-weight="700" text-anchor="middle"><tspan x="344.0" dy="0">See Projects</tspan></text><text x="104" y="592" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="104" dy="0">Built for donors, volunteers, NGOs, social investors,</tspan><tspan x="104" dy="20.2">creatives, youth groups, and communities who want to see</tspan><tspan x="104" dy="20.2">credible work and take action.</tspan></text><rect x="780" y="170" width="240" height="210" rx="28" fill="#16463F" stroke-width="1"/><rect x="798" y="188" width="204" height="174" rx="22" fill="#FFFDF8" stroke-width="1" opacity="0.18"/><circle cx="950" cy="230" r="28" fill="#E5C37A" opacity="0.7"/><circle cx="838" cy="316" r="20" fill="#FFFDF8" opacity="0.55"/><text x="808" y="344" fill="#FFFDF8" font-family="Arial" font-size="16" font-weight="700" text-anchor="start"><tspan x="808" dy="0">Field outreach and</tspan><tspan x="808" dy="21.6">maternal health</tspan><tspan x="808" dy="21.6">support</tspan></text><rect x="1040" y="220" width="260" height="290" rx="28" fill="#C96D47" stroke-width="1"/><rect x="1058" y="238" width="224" height="254" rx="22" fill="#FFFDF8" stroke-width="1" opacity="0.18"/><circle cx="1230" cy="280" r="28" fill="#E5C37A" opacity="0.7"/><circle cx="1098" cy="446" r="20" fill="#FFFDF8" opacity="0.55"/><text x="1068" y="474" fill="#FFFDF8" font-family="Arial" font-size="16" font-weight="700" text-anchor="start"><tspan x="1068" dy="0">Youth sports leadership</tspan><tspan x="1068" dy="21.6">camp</tspan></text><rect x="760" y="404" width="260" height="220" rx="28" fill="#2E6159" stroke-width="1"/><rect x="778" y="422" width="224" height="184" rx="22" fill="#FFFDF8" stroke-width="1" opacity="0.18"/><circle cx="950" cy="464" r="28" fill="#E5C37A" opacity="0.7"/><circle cx="818" cy="560" r="20" fill="#FFFDF8" opacity="0.55"/><text x="788" y="588" fill="#FFFDF8" font-family="Arial" font-size="16" font-weight="700" text-anchor="start"><tspan x="788" dy="0">Creative advocacy and</tspan><tspan x="788" dy="21.6">storytelling</tspan></text><text x="86" y="748" fill="#C96D47" font-family="Arial" font-size="16" font-weight="700" text-anchor="start"><tspan x="86" dy="0">Proof of impact</tspan></text><rect x="90" y="790" width="290" height="128" rx="24" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="84" y="780" width="290" height="128" rx="24" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="108" y="824" fill="#16463F" font-family="Georgia" font-size="30" font-weight="700" text-anchor="start"><tspan x="108" dy="0">24</tspan></text><text x="108" y="858" fill="#746B64" font-family="Arial" font-size="14" font-weight="400" text-anchor="start"><tspan x="108" dy="0">Community projects documented</tspan></text><rect x="398" y="790" width="290" height="128" rx="24" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="392" y="780" width="290" height="128" rx="24" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="416" y="824" fill="#16463F" font-family="Georgia" font-size="30" font-weight="700" text-anchor="start"><tspan x="416" dy="0">5</tspan></text><text x="416" y="858" fill="#746B64" font-family="Arial" font-size="14" font-weight="400" text-anchor="start"><tspan x="416" dy="0">Program pillars presented</tspan><tspan x="416" dy="18.9">clearly</tspan></text><rect x="706" y="790" width="290" height="128" rx="24" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="700" y="780" width="290" height="128" rx="24" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="724" y="824" fill="#16463F" font-family="Georgia" font-size="30" font-weight="700" text-anchor="start"><tspan x="724" dy="0">3 min</tspan></text><text x="724" y="858" fill="#746B64" font-family="Arial" font-size="14" font-weight="400" text-anchor="start"><tspan x="724" dy="0">Average path to donation</tspan></text><rect x="1014" y="790" width="348" height="128" rx="24" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="1008" y="780" width="348" height="128" rx="24" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="1032" y="824" fill="#16463F" font-family="Georgia" font-size="30" font-weight="700" text-anchor="start"><tspan x="1032" dy="0">Low-bandwidth</tspan></text><text x="1032" y="858" fill="#746B64" font-family="Arial" font-size="14" font-weight="400" text-anchor="start"><tspan x="1032" dy="0">Performance-first experience for</tspan><tspan x="1032" dy="18.9">mobile users</tspan></text><text x="84" y="982" fill="#C96D47" font-family="Arial" font-size="13" font-weight="700" text-anchor="start"><tspan x="84" dy="0">PROGRAM PILLARS</tspan></text><text x="84" y="1016" fill="#1E1A18" font-family="Georgia" font-size="34" font-weight="700" text-anchor="start"><tspan x="84" dy="0">A home page that proves</tspan><tspan x="84" dy="45.9">breadth without losing focus.</tspan></text><text x="84" y="1092" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="84" dy="0">Each pillar is treated as a gateway into impact work, not just</tspan><tspan x="84" dy="21.6">a decorative category.</tspan></text><rect x="90" y="1190" width="602" height="188" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="84" y="1180" width="602" height="188" rx="28" fill="#E4ECE9" stroke="#D8D0C3" stroke-width="1"/><text x="114" y="1238" fill="#16463F" font-family="Georgia" font-size="28" font-weight="700" text-anchor="start"><tspan x="114" dy="0">Education Access</tspan></text><text x="114" y="1286" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="114" dy="0">Books, digital skills, downloadable</tspan><tspan x="114" dy="21.6">resources, and external lessons.</tspan></text><rect x="114" y="1316" width="138" height="38" rx="19" fill="#FFFDF8" stroke-width="1"/><text x="183.0" y="1340" fill="#16463F" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="183.0" dy="0">Explore section</tspan></text><rect x="724" y="1190" width="602" height="188" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="718" y="1180" width="602" height="188" rx="28" fill="#F9EFEA" stroke="#D8D0C3" stroke-width="1"/><text x="748" y="1238" fill="#16463F" font-family="Georgia" font-size="28" font-weight="700" text-anchor="start"><tspan x="748" dy="0">Arts &amp; Music</tspan></text><text x="748" y="1286" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="748" dy="0">Creative advocacy, artist spotlights,</tspan><tspan x="748" dy="21.6">spoken word, and story-led campaigns.</tspan></text><rect x="748" y="1316" width="138" height="38" rx="19" fill="#FFFDF8" stroke-width="1"/><text x="817.0" y="1340" fill="#16463F" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="817.0" dy="0">Explore section</tspan></text><rect x="90" y="1410" width="602" height="188" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="84" y="1400" width="602" height="188" rx="28" fill="#EEF5F0" stroke="#D8D0C3" stroke-width="1"/><text x="114" y="1458" fill="#16463F" font-family="Georgia" font-size="28" font-weight="700" text-anchor="start"><tspan x="114" dy="0">Public Health</tspan></text><text x="114" y="1506" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="114" dy="0">Preventive health education, safety</tspan><tspan x="114" dy="21.6">resources, and community campaigns.</tspan></text><rect x="114" y="1536" width="138" height="38" rx="19" fill="#FFFDF8" stroke-width="1"/><text x="183.0" y="1560" fill="#16463F" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="183.0" dy="0">Explore section</tspan></text><rect x="724" y="1410" width="602" height="188" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="718" y="1400" width="602" height="188" rx="28" fill="#FBF3E5" stroke="#D8D0C3" stroke-width="1"/><text x="748" y="1458" fill="#16463F" font-family="Georgia" font-size="28" font-weight="700" text-anchor="start"><tspan x="748" dy="0">Sports Development</tspan></text><text x="748" y="1506" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="748" dy="0">Grassroots programs, talent</tspan><tspan x="748" dy="21.6">spotlighting, drills, and youth</tspan><tspan x="748" dy="21.6">engagement.</tspan></text><rect x="748" y="1536" width="138" height="38" rx="19" fill="#FFFDF8" stroke-width="1"/><text x="817.0" y="1560" fill="#16463F" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="817.0" dy="0">Explore section</tspan></text><text x="84" y="1658" fill="#C96D47" font-family="Arial" font-size="13" font-weight="700" text-anchor="start"><tspan x="84" dy="0">FEATURED IMPACT STORY</tspan></text><text x="84" y="1692" fill="#1E1A18" font-family="Georgia" font-size="34" font-weight="700" text-anchor="start"><tspan x="84" dy="0">Put a living story at the</tspan><tspan x="84" dy="45.9">center of the page.</tspan></text><text x="84" y="1768" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="84" dy="0">Instead of leading with generic text, the design gives one</tspan><tspan x="84" dy="21.6">flagship story a large, emotional block with room for quotes</tspan><tspan x="84" dy="21.6">and evidence.</tspan></text><rect x="90" y="1860" width="1270" height="250" rx="32" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="84" y="1850" width="1270" height="250" rx="32" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><rect x="112" y="1880" width="360" height="190" rx="28" fill="#C96D47" stroke-width="1"/><rect x="130" y="1898" width="324" height="154" rx="22" fill="#FFFDF8" stroke-width="1" opacity="0.18"/><circle cx="402" cy="1940" r="28" fill="#E5C37A" opacity="0.7"/><circle cx="170" cy="2006" r="20" fill="#FFFDF8" opacity="0.55"/><text x="140" y="2034" fill="#FFFDF8" font-family="Arial" font-size="16" font-weight="700" text-anchor="start"><tspan x="140" dy="0">Project spotlight photo</tspan></text><text x="510" y="1918" fill="#1E1A18" font-family="Georgia" font-size="34" font-weight="700" text-anchor="start"><tspan x="510" dy="0">Safe beginnings for mothers</tspan><tspan x="510" dy="45.9">and children</tspan></text><text x="510" y="1988" fill="#746B64" font-family="Arial" font-size="17" font-weight="400" text-anchor="start"><tspan x="510" dy="0">Feature one intervention with a short narrative, one</tspan><tspan x="510" dy="23.0">quote, and a visible result panel so supporters</tspan><tspan x="510" dy="23.0">immediately understand what changed and why it matters.</tspan></text><rect x="510" y="2060" width="130" height="38" rx="19" fill="#16463F" stroke-width="1"/><text x="575.0" y="2084" fill="#FFFDF8" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="575.0" dy="0">Read full</tspan><tspan x="575.0" dy="18.9">story</tspan></text><rect x="652" y="2060" width="118" height="38" rx="19" fill="#E4ECE9" stroke-width="1"/><text x="711.0" y="2084" fill="#16463F" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="711.0" dy="0">View report</tspan></text>
