<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="2200" viewBox="0 0 1440 2200">
<title>About Screen</title>
<rect width="1440" height="2200" fill="#F5F0E6"/>
<circle cx="1360" cy="120" r="220" fill="#E5C37A" opacity="0.32"/>
<circle cx="86" cy="2110" r="180" fill="#B8C8C1" opacity="0.24"/>
<text x="92" y="74" fill="#16463F" font-family="Georgia" font-size="24" font-weight="700" text-anchor="start"><tspan x="92" dy="0">Humanity First</tspan></text><text x="92" y="96" fill="#746B64" font-family="Arial" font-size="14" font-weight="700" text-anchor="start"><tspan x="92" dy="0">Initiative</tspan></text><text x="520" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="520" dy="0">Home</tspan></text><text x="615" y="78" fill="#16463F" font-family="Arial" font-size="15" font-weight="700" text-anchor="start"><tspan x="615" dy="0">About</tspan></text><text x="720" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="720" dy="0">Projects</tspan></text><text x="836" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="836" dy="0">Programs</tspan></text><text x="960" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="960" dy="0">Donate</tspan></text><text x="1064" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="1064" dy="0">Get Involved</tspan></text><rect x="1210" y="50" width="138" height="48" rx="24" fill="#16463F" stroke-width="1.5"/><text x="1279.0" y="80" fill="#FFFDF8" font-family="Arial" font-size="15" font-weight="700" text-anchor="middle"><tspan x="1279.0" dy="0">Donate Now</tspan></text><text x="84" y="150" fill="#C96D47" font-family="Arial" font-size="13" font-weight="700" text-anchor="start"><tspan x="84" dy="0">ABOUT THE INITIATIVE</tspan></text><text x="84" y="184" fill="#1E1A18" font-family="Georgia" font-size="34" font-weight="700" text-anchor="start"><tspan x="84" dy="0">A founder story that feels personal,</tspan><tspan x="84" dy="45.9">grounded, and expandable.</tspan></text><text x="84" y="260" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="84" dy="0">The about page builds trust through story, values, and a clear sense of how</tspan><tspan x="84" dy="21.6">the work can scale beyond one person or one region.</tspan></text><rect x="864" y="132" width="472" height="360" rx="28" fill="#16463F" stroke-width="1"/><rect x="882" y="150" width="436" height="324" rx="22" fill="#FFFDF8" stroke-width="1" opacity="0.18"/><circle cx="1266" cy="192" r="28" fill="#E5C37A" opacity="0.7"/><circle cx="922" cy="428" r="20" fill="#FFFDF8" opacity="0.55"/><text x="892" y="456" fill="#FFFDF8" font-family="Arial" font-size="16" font-weight="700" text-anchor="start"><tspan x="892" dy="0">Founder portrait / field photo</tspan></text><rect x="90" y="440" width="580" height="330" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="84" y="430" width="580" height="330" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="116" y="486" fill="#16463F" font-family="Georgia" font-size="28" font-weight="700" text-anchor="start"><tspan x="116" dy="0">Why this started</tspan></text><text x="116" y="536" fill="#1E1A18" font-family="Arial" font-size="17" font-weight="400" text-anchor="start"><tspan x="116" dy="0">Use this section to narrate the human reason behind</tspan><tspan x="116" dy="23.0">the work: what was seen in the field, what gaps</tspan><tspan x="116" dy="23.0">became impossible to ignore, and why action had to</tspan><tspan x="116" dy="23.0">become structured and visible.</tspan></text><text x="116" y="652" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="116" dy="0">The tone here should be honest and dignified, with</tspan><tspan x="116" dy="21.6">enough detail to feel real without overwhelming first-</tspan><tspan x="116" dy="21.6">time visitors.</tspan></text><rect x="696" y="440" width="646" height="330" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="690" y="430" width="646" height="330" rx="28" fill="#E4ECE9" stroke="#D8D0C3" stroke-width="1"/><text x="722" y="486" fill="#16463F" font-family="Georgia" font-size="28" font-weight="700" text-anchor="start"><tspan x="722" dy="0">Vision and Mission</tspan></text><text x="722" y="540" fill="#C96D47" font-family="Arial" font-size="18" font-weight="700" text-anchor="start"><tspan x="722" dy="0">Vision</tspan></text><text x="722" y="572" fill="#1E1A18" font-family="Arial" font-size="17" font-weight="400" text-anchor="start"><tspan x="722" dy="0">A continent where local changemakers have the visibility,</tspan><tspan x="722" dy="23.0">support, and systems needed to sustain long-term</tspan><tspan x="722" dy="23.0">humanitarian impact.</tspan></text><text x="722" y="654" fill="#C96D47" font-family="Arial" font-size="18" font-weight="700" text-anchor="start"><tspan x="722" dy="0">Mission</tspan></text><text x="722" y="686" fill="#1E1A18" font-family="Arial" font-size="17" font-weight="400" text-anchor="start"><tspan x="722" dy="0">To document, amplify, and grow grassroots interventions</tspan><tspan x="722" dy="23.0">through storytelling, donations, education, advocacy, and</tspan><tspan x="722" dy="23.0">partnerships.</tspan></text><text x="84" y="846" fill="#C96D47" font-family="Arial" font-size="13" font-weight="700" text-anchor="start"><tspan x="84" dy="0">CORE VALUES</tspan></text><text x="84" y="880" fill="#1E1A18" font-family="Georgia" font-size="34" font-weight="700" text-anchor="start"><tspan x="84" dy="0">Show the ethics behind the</tspan><tspan x="84" dy="45.9">platform.</tspan></text><text x="84" y="956" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="84" dy="0">These cards keep the initiative from feeling abstract by naming</tspan><tspan x="84" dy="21.6">the principles that guide each program and partnership.</tspan></text><rect x="90" y="1054" width="602" height="168" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="84" y="1044" width="602" height="168" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="114" y="1100" fill="#16463F" font-family="Georgia" font-size="26" font-weight="700" text-anchor="start"><tspan x="114" dy="0">Dignity first</tspan></text><text x="114" y="1146" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="114" dy="0">Every story, image, and call to action should protect the</tspan><tspan x="114" dy="21.6">dignity of the people being served.</tspan></text><rect x="724" y="1054" width="602" height="168" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="718" y="1044" width="602" height="168" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="748" y="1100" fill="#16463F" font-family="Georgia" font-size="26" font-weight="700" text-anchor="start"><tspan x="748" dy="0">Transparency</tspan></text><text x="748" y="1146" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="748" dy="0">Donors and partners should understand where support goes</tspan><tspan x="748" dy="21.6">and what outcomes it helps create.</tspan></text><rect x="90" y="1254" width="602" height="168" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="84" y="1244" width="602" height="168" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="114" y="1300" fill="#16463F" font-family="Georgia" font-size="26" font-weight="700" text-anchor="start"><tspan x="114" dy="0">Community voice</tspan></text><text x="114" y="1346" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="114" dy="0">Programs are strongest when shaped with local participation</tspan><tspan x="114" dy="21.6">rather than imposed from the outside.</tspan></text><rect x="724" y="1254" width="602" height="168" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="718" y="1244" width="602" height="168" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="748" y="1300" fill="#16463F" font-family="Georgia" font-size="26" font-weight="700" text-anchor="start"><tspan x="748" dy="0">Creative</tspan><tspan x="748" dy="35.1">empowerment</tspan></text><text x="748" y="1346" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="748" dy="0">Arts, music, and storytelling are tools for healing,</tspan><tspan x="748" dy="21.6">visibility, and advocacy.</tspan></text><text x="84" y="1494" fill="#C96D47" font-family="Arial" font-size="13" font-weight="700" text-anchor="start"><tspan x="84" dy="0">GROWTH MAP</tspan></text><text x="84" y="1528" fill="#1E1A18" font-family="Georgia" font-size="34" font-weight="700" text-anchor="start"><tspan x="84" dy="0">Make the expansion story</tspan><tspan x="84" dy="45.9">visible.</tspan></text><text x="84" y="1604" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="84" dy="0">This block hints at future growth across African countries so</tspan><tspan x="84" dy="21.6">the initiative feels intentionally scalable from day one.</tspan></text><rect x="90" y="1698" width="1270" height="314" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="84" y="1688" width="1270" height="314" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><rect x="116" y="1720" width="528" height="250" rx="28" fill="#EDF3EF" stroke-width="1"/><text x="150" y="1780" fill="#16463F" font-family="Georgia" font-size="30" font-weight="700" text-anchor="start"><tspan x="150" dy="0">Africa expansion panel</tspan></text><text x="150" y="1842" fill="#746B64" font-family="Arial" font-size="17" font-weight="400" text-anchor="start"><tspan x="150" dy="0">Ghana partner, founder location, future</tspan><tspan x="150" dy="23.0">partner countries, and campaign clusters can</tspan><tspan x="150" dy="23.0">live here as a styled map or marker system</tspan><tspan x="150" dy="23.0">in Figma.</tspan></text><rect x="684" y="1720" width="306" height="118" rx="24" fill="#E4ECE9" stroke-width="1"/><rect x="1010" y="1720" width="306" height="118" rx="24" fill="#F8EEE8" stroke-width="1"/><rect x="684" y="1852" width="632" height="118" rx="24" fill="#F3F5F4" stroke-width="1"/><text x="714" y="1770" fill="#16463F" font-family="Georgia" font-size="20" font-weight="700" text-anchor="start"><tspan x="714" dy="0">Country 01</tspan></text><text x="714" y="1804" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="714" dy="0">Founder-led programs</tspan></text><text x="1040" y="1770" fill="#16463F" font-family="Georgia" font-size="20" font-weight="700" text-anchor="start"><tspan x="1040" dy="0">Country 02</tspan></text><text x="1040" y="1804" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="1040" dy="0">Ghana-based partner</tspan></text><text x="714" y="1902" fill="#16463F" font-family="Georgia" font-size="20" font-weight="700" text-anchor="start"><tspan x="714" dy="0">Future contributor onboarding and campaign growth</tspan><tspan x="714" dy="27.0">blocks</tspan></text><text x="714" y="1938" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="714" dy="0">Use this area for partner logos, regions, and collaboration</tspan><tspan x="714" dy="20.2">pathways.</tspan></text>
</svg>
