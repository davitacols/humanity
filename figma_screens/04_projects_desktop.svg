<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="2200" viewBox="0 0 1440 2200">
<title>Projects Screen</title>
<rect width="1440" height="2200" fill="#F5F0E6"/>
<circle cx="1360" cy="120" r="220" fill="#E5C37A" opacity="0.32"/>
<circle cx="86" cy="2110" r="180" fill="#B8C8C1" opacity="0.24"/>
<text x="92" y="74" fill="#16463F" font-family="Georgia" font-size="24" font-weight="700" text-anchor="start"><tspan x="92" dy="0">Humanity First</tspan></text><text x="92" y="96" fill="#746B64" font-family="Arial" font-size="14" font-weight="700" text-anchor="start"><tspan x="92" dy="0">Initiative</tspan></text><text x="520" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="520" dy="0">Home</tspan></text><text x="615" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="615" dy="0">About</tspan></text><text x="720" y="78" fill="#16463F" font-family="Arial" font-size="15" font-weight="700" text-anchor="start"><tspan x="720" dy="0">Projects</tspan></text><text x="836" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="836" dy="0">Programs</tspan></text><text x="960" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="960" dy="0">Donate</tspan></text><text x="1064" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="1064" dy="0">Get Involved</tspan></text><rect x="1210" y="50" width="138" height="48" rx="24" fill="#16463F" stroke-width="1.5"/><text x="1279.0" y="80" fill="#FFFDF8" font-family="Arial" font-size="15" font-weight="700" text-anchor="middle"><tspan x="1279.0" dy="0">Donate Now</tspan></text><text x="84" y="148" fill="#C96D47" font-family="Arial" font-size="13" font-weight="700" text-anchor="start"><tspan x="84" dy="0">PROJECTS &amp; STORIES</tspan></text><text x="84" y="182" fill="#1E1A18" font-family="Georgia" font-size="34" font-weight="700" text-anchor="start"><tspan x="84" dy="0">A project archive that feels rich, not</tspan><tspan x="84" dy="45.9">crowded.</tspan></text><text x="84" y="258" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="84" dy="0">The projects experience balances storytelling with filterable structure so visitors</tspan><tspan x="84" dy="21.6">can move from overview to specific interventions without confusion.</tspan></text><rect x="1030" y="154" width="94" height="38" rx="19" fill="#E4ECE9" stroke-width="1"/><text x="1077.0" y="178" fill="#16463F" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="1077.0" dy="0">Health</tspan></text><rect x="1136" y="154" width="110" height="38" rx="19" fill="#FFFDF8" stroke-width="1"/><text x="1191.0" y="178" fill="#16463F" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="1191.0" dy="0">Education</tspan></text><rect x="1258" y="154" width="94" height="38" rx="19" fill="#FFFDF8" stroke-width="1"/><text x="1305.0" y="178" fill="#16463F" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="1305.0" dy="0">Sports</tspan></text><rect x="90" y="326" width="1270" height="404" rx="34" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="84" y="316" width="1270" height="404" rx="34" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><rect x="112" y="344" width="440" height="348" rx="28" fill="#2E6159" stroke-width="1"/><rect x="130" y="362" width="404" height="312" rx="22" fill="#FFFDF8" stroke-width="1" opacity="0.18"/><circle cx="482" cy="404" r="28" fill="#E5C37A" opacity="0.7"/><circle cx="170" cy="628" r="20" fill="#FFFDF8" opacity="0.55"/><text x="140" y="656" fill="#FFFDF8" font-family="Arial" font-size="16" font-weight="700" text-anchor="start"><tspan x="140" dy="0">Flagship impact story</tspan></text><text x="592" y="396" fill="#1E1A18" font-family="Georgia" font-size="40" font-weight="700" text-anchor="start"><tspan x="592" dy="0">Featured case study:</tspan><tspan x="592" dy="54.0">Community health outreach</tspan><tspan x="592" dy="54.0">with measurable follow-up</tspan></text><text x="592" y="518" fill="#746B64" font-family="Arial" font-size="17" font-weight="400" text-anchor="start"><tspan x="592" dy="0">This hero block is designed for one anchor story with a short</tspan><tspan x="592" dy="23.0">narrative, a testimonial, and two proof tiles so the page starts</tspan><tspan x="592" dy="23.0">with substance instead of a generic grid.</tspan></text><rect x="592" y="612" width="180" height="58" rx="20" fill="#E4ECE9" stroke-width="1"/><text x="622" y="650" fill="#16463F" font-family="Arial" font-size="18" font-weight="700" text-anchor="start"><tspan x="622" dy="0">1,200+ reached</tspan></text><rect x="788" y="612" width="210" height="58" rx="20" fill="#F8EEE8" stroke-width="1"/><text x="818" y="650" fill="#16463F" font-family="Arial" font-size="18" font-weight="700" text-anchor="start"><tspan x="818" dy="0">4 partner clinics</tspan></text><rect x="592" y="694" width="136" height="48" rx="24" fill="#16463F" stroke-width="1.5"/><text x="660.0" y="724" fill="#FFFDF8" font-family="Arial" font-size="15" font-weight="700" text-anchor="middle"><tspan x="660.0" dy="0">Open Story</tspan></text><rect x="90" y="796" width="394" height="318" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="84" y="786" width="394" height="318" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><rect x="108" y="810" width="346" height="134" rx="28" fill="#16463F" stroke-width="1"/><rect x="126" y="828" width="310" height="98" rx="22" fill="#FFFDF8" stroke-width="1" opacity="0.18"/><circle cx="384" cy="870" r="28" fill="#E5C37A" opacity="0.7"/><circle cx="166" cy="880" r="20" fill="#FFFDF8" opacity="0.55"/><text x="136" y="908" fill="#FFFDF8" font-family="Arial" font-size="16" font-weight="700" text-anchor="start"><tspan x="136" dy="0">Maternal health kits</tspan></text><rect x="108" y="964" width="94" height="38" rx="19" fill="#E4ECE9" stroke-width="1"/><text x="155.0" y="988" fill="#16463F" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="155.0" dy="0">Health</tspan></text><text x="108" y="1014" fill="#1E1A18" font-family="Georgia" font-size="26" font-weight="700" text-anchor="start"><tspan x="108" dy="0">Maternal health kits</tspan></text><text x="108" y="1056" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="108" dy="0">Short cards with an image, a category, a</tspan><tspan x="108" dy="20.2">2-line summary, and a CTA keep the</tspan><tspan x="108" dy="20.2">archive easy to scan.</tspan></text><rect x="516" y="796" width="394" height="318" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="510" y="786" width="394" height="318" rx="28" fill="#FAF5EC" stroke="#D8D0C3" stroke-width="1"/><rect x="534" y="810" width="346" height="134" rx="28" fill="#C96D47" stroke-width="1"/><rect x="552" y="828" width="310" height="98" rx="22" fill="#FFFDF8" stroke-width="1" opacity="0.18"/><circle cx="810" cy="870" r="28" fill="#E5C37A" opacity="0.7"/><circle cx="592" cy="880" r="20" fill="#FFFDF8" opacity="0.55"/><text x="562" y="908" fill="#FFFDF8" font-family="Arial" font-size="16" font-weight="700" text-anchor="start"><tspan x="562" dy="0">Coding club launch</tspan></text><rect x="534" y="964" width="98" height="38" rx="19" fill="#E4ECE9" stroke-width="1"/><text x="583.0" y="988" fill="#16463F" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="583.0" dy="0">Education</tspan></text><text x="534" y="1014" fill="#1E1A18" font-family="Georgia" font-size="26" font-weight="700" text-anchor="start"><tspan x="534" dy="0">Coding club launch</tspan></text><text x="534" y="1056" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="534" dy="0">This layout lets you mix programs,</tspan><tspan x="534" dy="20.2">awareness campaigns, and creative</tspan><tspan x="534" dy="20.2">interventions in one system.</tspan></text><rect x="942" y="796" width="394" height="318" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="936" y="786" width="394" height="318" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><rect x="960" y="810" width="346" height="134" rx="28" fill="#16463F" stroke-width="1"/><rect x="978" y="828" width="310" height="98" rx="22" fill="#FFFDF8" stroke-width="1" opacity="0.18"/><circle cx="1236" cy="870" r="28" fill="#E5C37A" opacity="0.7"/><circle cx="1018" cy="880" r="20" fill="#FFFDF8" opacity="0.55"/><text x="988" y="908" fill="#FFFDF8" font-family="Arial" font-size="16" font-weight="700" text-anchor="start"><tspan x="988" dy="0">Youth football outreach</tspan></text><rect x="960" y="964" width="94" height="38" rx="19" fill="#E4ECE9" stroke-width="1"/><text x="1007.0" y="988" fill="#16463F" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="1007.0" dy="0">Sports</tspan></text><text x="960" y="1014" fill="#1E1A18" font-family="Georgia" font-size="26" font-weight="700" text-anchor="start"><tspan x="960" dy="0">Youth football</tspan><tspan x="960" dy="35.1">outreach</tspan></text><text x="960" y="1056" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="960" dy="0">Each tile can show status, location,</tspan><tspan x="960" dy="20.2">date, or partner badges depending on the</tspan><tspan x="960" dy="20.2">project type.</tspan></text><rect x="90" y="1146" width="394" height="318" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="84" y="1136" width="394" height="318" rx="28" fill="#FAF5EC" stroke="#D8D0C3" stroke-width="1"/><rect x="108" y="1160" width="346" height="134" rx="28" fill="#C96D47" stroke-width="1"/><rect x="126" y="1178" width="310" height="98" rx="22" fill="#FFFDF8" stroke-width="1" opacity="0.18"/><circle cx="384" cy="1220" r="28" fill="#E5C37A" opacity="0.7"/><circle cx="166" cy="1230" r="20" fill="#FFFDF8" opacity="0.55"/><text x="136" y="1258" fill="#FFFDF8" font-family="Arial" font-size="16" font-weight="700" text-anchor="start"><tspan x="136" dy="0">Storytelling for advocacy</tspan></text><rect x="108" y="1314" width="122" height="38" rx="19" fill="#E4ECE9" stroke-width="1"/><text x="169.0" y="1338" fill="#16463F" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="169.0" dy="0">Arts &amp; Music</tspan></text><text x="108" y="1364" fill="#1E1A18" font-family="Georgia" font-size="26" font-weight="700" text-anchor="start"><tspan x="108" dy="0">Storytelling for</tspan><tspan x="108" dy="35.1">advocacy</tspan></text><text x="108" y="1406" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="108" dy="0">Creative work is positioned as advocacy</tspan><tspan x="108" dy="20.2">and empowerment, not an afterthought.</tspan></text><rect x="516" y="1146" width="394" height="318" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="510" y="1136" width="394" height="318" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><rect x="534" y="1160" width="346" height="134" rx="28" fill="#16463F" stroke-width="1"/><rect x="552" y="1178" width="310" height="98" rx="22" fill="#FFFDF8" stroke-width="1" opacity="0.18"/><circle cx="810" cy="1220" r="28" fill="#E5C37A" opacity="0.7"/><circle cx="592" cy="1230" r="20" fill="#FFFDF8" opacity="0.55"/><text x="562" y="1258" fill="#FFFDF8" font-family="Arial" font-size="16" font-weight="700" text-anchor="start"><tspan x="562" dy="0">School safety awareness</tspan></text><rect x="534" y="1314" width="130" height="38" rx="19" fill="#E4ECE9" stroke-width="1"/><text x="599.0" y="1338" fill="#16463F" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="599.0" dy="0">Public Health</tspan></text><text x="534" y="1364" fill="#1E1A18" font-family="Georgia" font-size="26" font-weight="700" text-anchor="start"><tspan x="534" dy="0">School safety</tspan><tspan x="534" dy="35.1">awareness</tspan></text><text x="534" y="1406" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="534" dy="0">The grid can scale as more countries and</tspan><tspan x="534" dy="20.2">contributors join the platform.</tspan></text><rect x="942" y="1146" width="394" height="318" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="936" y="1136" width="394" height="318" rx="28" fill="#FAF5EC" stroke="#D8D0C3" stroke-width="1"/><rect x="960" y="1160" width="346" height="134" rx="28" fill="#C96D47" stroke-width="1"/><rect x="978" y="1178" width="310" height="98" rx="22" fill="#FFFDF8" stroke-width="1" opacity="0.18"/><circle cx="1236" cy="1220" r="28" fill="#E5C37A" opacity="0.7"/><circle cx="1018" cy="1230" r="20" fill="#FFFDF8" opacity="0.55"/><text x="988" y="1258" fill="#FFFDF8" font-family="Arial" font-size="16" font-weight="700" text-anchor="start"><tspan x="988" dy="0">Nutrition flyer campaign</tspan></text><rect x="960" y="1314" width="130" height="38" rx="19" fill="#E4ECE9" stroke-width="1"/><text x="1025.0" y="1338" fill="#16463F" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="1025.0" dy="0">Public Health</tspan></text><text x="960" y="1364" fill="#1E1A18" font-family="Georgia" font-size="26" font-weight="700" text-anchor="start"><tspan x="960" dy="0">Nutrition flyer</tspan><tspan x="960" dy="35.1">campaign</tspan></text><text x="960" y="1406" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="960" dy="0">Cards can link to updates, reports,</tspan><tspan x="960" dy="20.2">galleries, or donation-specific goals.</tspan></text><text x="84" y="1548" fill="#C96D47" font-family="Arial" font-size="13" font-weight="700" text-anchor="start"><tspan x="84" dy="0">VOICES FROM THE FIELD</tspan></text><text x="84" y="1582" fill="#1E1A18" font-family="Georgia" font-size="34" font-weight="700" text-anchor="start"><tspan x="84" dy="0">A testimonial strip that adds</tspan><tspan x="84" dy="45.9">warmth and credibility.</tspan></text><text x="84" y="1658" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="84" dy="0">Use quotes from beneficiaries, collaborators, or volunteers to</tspan><tspan x="84" dy="21.6">break up the archive and remind visitors there are real people</tspan><tspan x="84" dy="21.6">behind each result.</tspan></text><rect x="90" y="1748" width="1270" height="228" rx="32" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="84" y="1738" width="1270" height="228" rx="32" fill="#E4ECE9" stroke="#D8D0C3" stroke-width="1"/><text x="118" y="1810" fill="#16463F" font-family="Georgia" font-size="22" font-weight="700" text-anchor="start"><tspan x="118" dy="0">“The outreach helped</tspan><tspan x="118" dy="29.7">mothers feel seen and</tspan><tspan x="118" dy="29.7">supported.”</tspan></text><text x="118" y="1888" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="118" dy="0">Program participant</tspan></text><text x="522" y="1810" fill="#16463F" font-family="Georgia" font-size="22" font-weight="700" text-anchor="start"><tspan x="522" dy="0">“The reporting made it</tspan><tspan x="522" dy="29.7">easy for us to trust the</tspan><tspan x="522" dy="29.7">work.”</tspan></text><text x="522" y="1888" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="522" dy="0">Donor / partner</tspan></text><text x="926" y="1810" fill="#16463F" font-family="Georgia" font-size="22" font-weight="700" text-anchor="start"><tspan x="926" dy="0">“The sports sessions</tspan><tspan x="926" dy="29.7">created discipline and</tspan><tspan x="926" dy="29.7">belonging.”</tspan></text><text x="926" y="1888" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="926" dy="0">Community coach</tspan></text>
</svg>
