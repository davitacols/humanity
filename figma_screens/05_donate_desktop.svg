<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="2200" viewBox="0 0 1440 2200">
<title>Donate Screen</title>
<rect width="1440" height="2200" fill="#F5F0E6"/>
<circle cx="1360" cy="120" r="220" fill="#E5C37A" opacity="0.32"/>
<circle cx="86" cy="2110" r="180" fill="#B8C8C1" opacity="0.24"/>
<text x="92" y="74" fill="#16463F" font-family="Georgia" font-size="24" font-weight="700" text-anchor="start"><tspan x="92" dy="0">Humanity First</tspan></text><text x="92" y="96" fill="#746B64" font-family="Arial" font-size="14" font-weight="700" text-anchor="start"><tspan x="92" dy="0">Initiative</tspan></text><text x="520" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="520" dy="0">Home</tspan></text><text x="615" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="615" dy="0">About</tspan></text><text x="720" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="720" dy="0">Projects</tspan></text><text x="836" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="836" dy="0">Programs</tspan></text><text x="960" y="78" fill="#16463F" font-family="Arial" font-size="15" font-weight="700" text-anchor="start"><tspan x="960" dy="0">Donate</tspan></text><text x="1064" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="1064" dy="0">Get Involved</tspan></text><rect x="1210" y="50" width="138" height="48" rx="24" fill="#16463F" stroke-width="1.5"/><text x="1279.0" y="80" fill="#FFFDF8" font-family="Arial" font-size="15" font-weight="700" text-anchor="middle"><tspan x="1279.0" dy="0">Donate Now</tspan></text><rect x="72" y="132" width="1296" height="460" rx="40" fill="#16463F" stroke-width="1"/><circle cx="1250" cy="250" r="150" fill="#E5C37A" opacity="0.22"/><text x="104" y="198" fill="#D7E6E1" font-family="Arial" font-size="16" font-weight="700" text-anchor="start"><tspan x="104" dy="0">Donations &amp; support</tspan></text><text x="104" y="266" fill="#FFFDF8" font-family="Georgia" font-size="52" font-weight="700" text-anchor="start"><tspan x="104" dy="0">A giving flow that</tspan><tspan x="104" dy="70.2">feels warm, secure,</tspan><tspan x="104" dy="70.2">and transparent.</tspan></text><text x="104" y="404" fill="#E0EBE7" font-family="Arial" font-size="18" font-weight="400" text-anchor="start"><tspan x="104" dy="0">This screen combines emotional clarity with donor</tspan><tspan x="104" dy="24.3">confidence: simple giving amounts, specific causes,</tspan><tspan x="104" dy="24.3">visible proof, and lightweight trust cues.</tspan></text><rect x="104" y="500" width="132" height="48" rx="24" fill="#FFFDF8" stroke="#16463F" stroke-width="1.5"/><text x="170.0" y="530" fill="#16463F" font-family="Arial" font-size="15" font-weight="700" text-anchor="middle"><tspan x="170.0" dy="0">Give Now</tspan></text><rect x="882" y="178" width="392" height="306" rx="28" fill="#C96D47" stroke-width="1"/><rect x="900" y="196" width="356" height="270" rx="22" fill="#FFFDF8" stroke-width="1" opacity="0.18"/><circle cx="1204" cy="238" r="28" fill="#E5C37A" opacity="0.7"/><circle cx="940" cy="420" r="20" fill="#FFFDF8" opacity="0.55"/><text x="910" y="448" fill="#FFFDF8" font-family="Arial" font-size="16" font-weight="700" text-anchor="start"><tspan x="910" dy="0">Trust panel / donor testimonial</tspan></text><text x="84" y="668" fill="#C96D47" font-family="Arial" font-size="13" font-weight="700" text-anchor="start"><tspan x="84" dy="0">CHOOSE AN AMOUNT</tspan></text><text x="84" y="702" fill="#1E1A18" font-family="Georgia" font-size="34" font-weight="700" text-anchor="start"><tspan x="84" dy="0">Support should feel direct</tspan><tspan x="84" dy="45.9">and easy.</tspan></text><text x="84" y="778" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="84" dy="0">Keep the first donation action simple, then allow cause-</tspan><tspan x="84" dy="21.6">specific selection below for supporters who want to direct</tspan><tspan x="84" dy="21.6">their impact.</tspan></text><rect x="84" y="878" width="284" height="120" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="226" y="940" fill="#16463F" font-family="Georgia" font-size="32" font-weight="700" text-anchor="middle"><tspan x="226" dy="0">NGN 10k</tspan></text><text x="226" y="974" fill="#746B64" font-family="Arial" font-size="14" font-weight="400" text-anchor="middle"><tspan x="226" dy="0">Suggested giving tier</tspan></text><rect x="400" y="878" width="284" height="120" rx="28" fill="#16463F" stroke-width="1"/><text x="542" y="940" fill="#FFFDF8" font-family="Georgia" font-size="32" font-weight="700" text-anchor="middle"><tspan x="542" dy="0">NGN 25k</tspan></text><text x="542" y="974" fill="#DFEAE7" font-family="Arial" font-size="14" font-weight="400" text-anchor="middle"><tspan x="542" dy="0">Suggested giving tier</tspan></text><rect x="716" y="878" width="284" height="120" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="858" y="940" fill="#16463F" font-family="Georgia" font-size="32" font-weight="700" text-anchor="middle"><tspan x="858" dy="0">NGN 50k</tspan></text><text x="858" y="974" fill="#746B64" font-family="Arial" font-size="14" font-weight="400" text-anchor="middle"><tspan x="858" dy="0">Suggested giving tier</tspan></text><rect x="1032" y="878" width="284" height="120" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="1174" y="940" fill="#16463F" font-family="Georgia" font-size="32" font-weight="700" text-anchor="middle"><tspan x="1174" dy="0">NGN 100k</tspan></text><text x="1174" y="974" fill="#746B64" font-family="Arial" font-size="14" font-weight="400" text-anchor="middle"><tspan x="1174" dy="0">Suggested giving tier</tspan></text><text x="84" y="1088" fill="#C96D47" font-family="Arial" font-size="13" font-weight="700" text-anchor="start"><tspan x="84" dy="0">DIRECT SUPPORT TO A CAUSE</tspan></text><text x="84" y="1122" fill="#1E1A18" font-family="Georgia" font-size="34" font-weight="700" text-anchor="start"><tspan x="84" dy="0">Cause cards make generosity</tspan><tspan x="84" dy="45.9">feel concrete.</tspan></text><text x="84" y="1198" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="84" dy="0">Use these as donation pathways for campaigns or program</tspan><tspan x="84" dy="21.6">sectors, with one sentence explaining what each contribution</tspan><tspan x="84" dy="21.6">supports.</tspan></text><rect x="90" y="1310" width="602" height="162" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="84" y="1300" width="602" height="162" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="114" y="1356" fill="#16463F" font-family="Georgia" font-size="26" font-weight="700" text-anchor="start"><tspan x="114" dy="0">Maternal &amp; child health</tspan></text><text x="114" y="1402" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="114" dy="0">Health supplies, outreach, and awareness</tspan><tspan x="114" dy="21.6">support.</tspan></text><rect x="524" y="1360" width="120" height="38" rx="19" fill="#E4ECE9" stroke-width="1"/><text x="584.0" y="1384" fill="#16463F" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="584.0" dy="0">Support</tspan></text><rect x="724" y="1310" width="602" height="162" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="718" y="1300" width="602" height="162" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="748" y="1356" fill="#16463F" font-family="Georgia" font-size="26" font-weight="700" text-anchor="start"><tspan x="748" dy="0">Education access</tspan></text><text x="748" y="1402" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="748" dy="0">Books, coding resources, and learning materials.</tspan></text><rect x="1158" y="1360" width="120" height="38" rx="19" fill="#E4ECE9" stroke-width="1"/><text x="1218.0" y="1384" fill="#16463F" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="1218.0" dy="0">Support</tspan></text><rect x="90" y="1504" width="602" height="162" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="84" y="1494" width="602" height="162" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="114" y="1550" fill="#16463F" font-family="Georgia" font-size="26" font-weight="700" text-anchor="start"><tspan x="114" dy="0">Youth sports</tspan></text><text x="114" y="1596" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="114" dy="0">Training kits, tournaments, and mentorship</tspan><tspan x="114" dy="21.6">support.</tspan></text><rect x="524" y="1554" width="120" height="38" rx="19" fill="#E4ECE9" stroke-width="1"/><text x="584.0" y="1578" fill="#16463F" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="584.0" dy="0">Support</tspan></text><rect x="724" y="1504" width="602" height="162" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="718" y="1494" width="602" height="162" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="748" y="1550" fill="#16463F" font-family="Georgia" font-size="26" font-weight="700" text-anchor="start"><tspan x="748" dy="0">Creative advocacy</tspan></text><text x="748" y="1596" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="748" dy="0">Storytelling, music campaigns, and artist</tspan><tspan x="748" dy="21.6">collaborations.</tspan></text><rect x="1158" y="1554" width="120" height="38" rx="19" fill="#E4ECE9" stroke-width="1"/><text x="1218.0" y="1578" fill="#16463F" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="1218.0" dy="0">Support</tspan></text><text x="84" y="1714" fill="#C96D47" font-family="Arial" font-size="13" font-weight="700" text-anchor="start"><tspan x="84" dy="0">TRANSPARENCY TRACKER</tspan></text><text x="84" y="1748" fill="#1E1A18" font-family="Georgia" font-size="34" font-weight="700" text-anchor="start"><tspan x="84" dy="0">Trust should stay visible</tspan><tspan x="84" dy="45.9">after the CTA.</tspan></text><text x="84" y="1824" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="84" dy="0">This section is intentionally visual: a simple allocation</tspan><tspan x="84" dy="21.6">snapshot, campaign progress, and reporting rhythm to reassure</tspan><tspan x="84" dy="21.6">supporters.</tspan></text><rect x="90" y="1916" width="1270" height="198" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="84" y="1906" width="1270" height="198" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="116" y="1960" fill="#16463F" font-family="Georgia" font-size="24" font-weight="700" text-anchor="start"><tspan x="116" dy="0">Donation allocation example</tspan></text><text x="116" y="2016" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="116" dy="0">Programs</tspan></text><rect x="308" y="1998" width="640" height="18" rx="9" fill="#EEE8DE" stroke-width="1"/><rect x="308" y="1998" width="396" height="18" rx="9" fill="#16463F" stroke-width="1"/><text x="972" y="2016" fill="#16463F" font-family="Arial" font-size="15" font-weight="700" text-anchor="start"><tspan x="972" dy="0">62%</tspan></text><text x="116" y="2056" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="116" dy="0">Outreach logistics</tspan></text><rect x="308" y="2038" width="640" height="18" rx="9" fill="#EEE8DE" stroke-width="1"/><rect x="308" y="2038" width="140" height="18" rx="9" fill="#C96D47" stroke-width="1"/><text x="972" y="2056" fill="#16463F" font-family="Arial" font-size="15" font-weight="700" text-anchor="start"><tspan x="972" dy="0">22%</tspan></text><text x="116" y="2096" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="116" dy="0">Reporting &amp;</tspan><tspan x="116" dy="20.2">operations</tspan></text><rect x="308" y="2078" width="640" height="18" rx="9" fill="#EEE8DE" stroke-width="1"/><rect x="308" y="2078" width="102" height="18" rx="9" fill="#E5C37A" stroke-width="1"/><text x="972" y="2096" fill="#16463F" font-family="Arial" font-size="15" font-weight="700" text-anchor="start"><tspan x="972" dy="0">16%</tspan></text>
</svg>
