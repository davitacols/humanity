<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1900" viewBox="0 0 1440 1900">
<title>Get Involved Screen</title>
<rect width="1440" height="1900" fill="#F5F0E6"/>
<circle cx="1360" cy="120" r="220" fill="#E5C37A" opacity="0.32"/>
<circle cx="86" cy="1810" r="180" fill="#B8C8C1" opacity="0.24"/>
<text x="92" y="74" fill="#16463F" font-family="Georgia" font-size="24" font-weight="700" text-anchor="start"><tspan x="92" dy="0">Humanity First</tspan></text><text x="92" y="96" fill="#746B64" font-family="Arial" font-size="14" font-weight="700" text-anchor="start"><tspan x="92" dy="0">Initiative</tspan></text><text x="520" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="520" dy="0">Home</tspan></text><text x="615" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="615" dy="0">About</tspan></text><text x="720" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="720" dy="0">Projects</tspan></text><text x="836" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="836" dy="0">Programs</tspan></text><text x="960" y="78" fill="#746B64" font-family="Arial" font-size="15" font-weight="600" text-anchor="start"><tspan x="960" dy="0">Donate</tspan></text><text x="1064" y="78" fill="#16463F" font-family="Arial" font-size="15" font-weight="700" text-anchor="start"><tspan x="1064" dy="0">Get Involved</tspan></text><rect x="1210" y="50" width="138" height="48" rx="24" fill="#16463F" stroke-width="1.5"/><text x="1279.0" y="80" fill="#FFFDF8" font-family="Arial" font-size="15" font-weight="700" text-anchor="middle"><tspan x="1279.0" dy="0">Donate Now</tspan></text><text x="84" y="150" fill="#C96D47" font-family="Arial" font-size="13" font-weight="700" text-anchor="start"><tspan x="84" dy="0">GET INVOLVED</tspan></text><text x="84" y="184" fill="#1E1A18" font-family="Georgia" font-size="34" font-weight="700" text-anchor="start"><tspan x="84" dy="0">Turn interest into action without</tspan><tspan x="84" dy="45.9">overwhelming people.</tspan></text><text x="84" y="260" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="84" dy="0">This page gives different supporter types their own path: volunteer, partner,</tspan><tspan x="84" dy="21.6">contributor, donor, or storyteller.</tspan></text><rect x="84" y="328" width="1270" height="264" rx="34" fill="#16463F" stroke-width="1"/><text x="118" y="404" fill="#FFFDF8" font-family="Georgia" font-size="42" font-weight="700" text-anchor="start"><tspan x="118" dy="0">Choose how you want</tspan><tspan x="118" dy="56.7">to help</tspan></text><text x="118" y="486" fill="#DDE8E4" font-family="Arial" font-size="17" font-weight="400" text-anchor="start"><tspan x="118" dy="0">The structure below makes it easy to route different</tspan><tspan x="118" dy="23.0">visitors into the right next step while still keeping</tspan><tspan x="118" dy="23.0">the page emotionally cohesive.</tspan></text><rect x="118" y="532" width="128" height="48" rx="24" fill="#FFFDF8" stroke="#16463F" stroke-width="1.5"/><text x="182.0" y="562" fill="#16463F" font-family="Arial" font-size="15" font-weight="700" text-anchor="middle"><tspan x="182.0" dy="0">Start Here</tspan></text><rect x="90" y="674" width="602" height="156" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="84" y="664" width="602" height="156" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="114" y="718" fill="#16463F" font-family="Georgia" font-size="28" font-weight="700" text-anchor="start"><tspan x="114" dy="0">Volunteer</tspan></text><text x="114" y="764" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="114" dy="0">Support outreach events, learning sessions, and</tspan><tspan x="114" dy="21.6">field programs.</tspan></text><rect x="542" y="720" width="112" height="38" rx="19" fill="#16463F" stroke-width="1"/><text x="598.0" y="744" fill="#FFFDF8" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="598.0" dy="0">Apply</tspan></text><rect x="724" y="674" width="602" height="156" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="718" y="664" width="602" height="156" rx="28" fill="#E4ECE9" stroke="#D8D0C3" stroke-width="1"/><text x="748" y="718" fill="#16463F" font-family="Georgia" font-size="28" font-weight="700" text-anchor="start"><tspan x="748" dy="0">Partner</tspan></text><text x="748" y="764" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="748" dy="0">Collaborate as an NGO, funder, or local</tspan><tspan x="748" dy="21.6">organization.</tspan></text><rect x="1176" y="720" width="112" height="38" rx="19" fill="#16463F" stroke-width="1"/><text x="1232.0" y="744" fill="#FFFDF8" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="1232.0" dy="0">Apply</tspan></text><rect x="90" y="864" width="602" height="156" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="84" y="854" width="602" height="156" rx="28" fill="#E4ECE9" stroke="#D8D0C3" stroke-width="1"/><text x="114" y="908" fill="#16463F" font-family="Georgia" font-size="28" font-weight="700" text-anchor="start"><tspan x="114" dy="0">Contribute</tspan></text><text x="114" y="954" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="114" dy="0">Share creative work, storytelling, music, or</tspan><tspan x="114" dy="21.6">educational resources.</tspan></text><rect x="542" y="910" width="112" height="38" rx="19" fill="#16463F" stroke-width="1"/><text x="598.0" y="934" fill="#FFFDF8" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="598.0" dy="0">Apply</tspan></text><rect x="724" y="864" width="602" height="156" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="718" y="854" width="602" height="156" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="748" y="908" fill="#16463F" font-family="Georgia" font-size="28" font-weight="700" text-anchor="start"><tspan x="748" dy="0">Sponsor</tspan></text><text x="748" y="954" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="748" dy="0">Fund a campaign, program area, or featured</tspan><tspan x="748" dy="21.6">intervention.</tspan></text><rect x="1176" y="910" width="112" height="38" rx="19" fill="#16463F" stroke-width="1"/><text x="1232.0" y="934" fill="#FFFDF8" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle"><tspan x="1232.0" dy="0">Apply</tspan></text><text x="84" y="1090" fill="#C96D47" font-family="Arial" font-size="13" font-weight="700" text-anchor="start"><tspan x="84" dy="0">SUBMISSION + UPDATES</tspan></text><text x="84" y="1124" fill="#1E1A18" font-family="Georgia" font-size="34" font-weight="700" text-anchor="start"><tspan x="84" dy="0">Blend engagement with proof</tspan><tspan x="84" dy="45.9">that the platform is active.</tspan></text><text x="84" y="1200" fill="#746B64" font-family="Arial" font-size="16" font-weight="400" text-anchor="start"><tspan x="84" dy="0">A contact flow on one side and a news / gallery snapshot on the</tspan><tspan x="84" dy="21.6">other helps the page feel actionable, not static.</tspan></text><rect x="90" y="1294" width="610" height="516" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="84" y="1284" width="610" height="516" rx="28" fill="#FFFDF8" stroke="#D8D0C3" stroke-width="1"/><text x="116" y="1342" fill="#16463F" font-family="Georgia" font-size="30" font-weight="700" text-anchor="start"><tspan x="116" dy="0">Contact / submission form</tspan></text><rect x="116" y="1408" width="546" height="54" rx="18" fill="#FBF8F2" stroke="#D8D0C3" stroke-width="1"/><text x="140" y="1442" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="140" dy="0">Full name</tspan></text><rect x="116" y="1480" width="546" height="54" rx="18" fill="#FBF8F2" stroke="#D8D0C3" stroke-width="1"/><text x="140" y="1514" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="140" dy="0">Email address</tspan></text><rect x="116" y="1552" width="546" height="54" rx="18" fill="#FBF8F2" stroke="#D8D0C3" stroke-width="1"/><text x="140" y="1586" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="140" dy="0">How would you like to contribute?</tspan></text><rect x="116" y="1624" width="546" height="120" rx="18" fill="#FBF8F2" stroke="#D8D0C3" stroke-width="1"/><text x="140" y="1658" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="140" dy="0">Tell us about your interest</tspan></text><rect x="116" y="1716" width="154" height="48" rx="24" fill="#16463F" stroke-width="1.5"/><text x="193.0" y="1746" fill="#FFFDF8" font-family="Arial" font-size="15" font-weight="700" text-anchor="middle"><tspan x="193.0" dy="0">Submit Interest</tspan></text><rect x="750" y="1294" width="610" height="516" rx="28" fill="#D9D1C3" stroke-width="1" opacity="0.35"/><rect x="744" y="1284" width="610" height="516" rx="28" fill="#E4ECE9" stroke="#D8D0C3" stroke-width="1"/><text x="776" y="1342" fill="#16463F" font-family="Georgia" font-size="30" font-weight="700" text-anchor="start"><tspan x="776" dy="0">News + gallery sidebar</tspan></text><rect x="776" y="1414" width="548" height="92" rx="20" fill="#FFFDF8" stroke-width="1"/><text x="802" y="1448" fill="#16463F" font-family="Arial" font-size="18" font-weight="700" text-anchor="start"><tspan x="802" dy="0">Field report</tspan></text><text x="802" y="1476" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="802" dy="0">New maternal health outreach published</tspan></text><rect x="776" y="1522" width="548" height="92" rx="20" fill="#FFFDF8" stroke-width="1"/><text x="802" y="1556" fill="#16463F" font-family="Arial" font-size="18" font-weight="700" text-anchor="start"><tspan x="802" dy="0">Volunteer call</tspan></text><text x="802" y="1584" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="802" dy="0">Community tournament support needed</tspan></text><rect x="776" y="1630" width="548" height="92" rx="20" fill="#FFFDF8" stroke-width="1"/><text x="802" y="1664" fill="#16463F" font-family="Arial" font-size="18" font-weight="700" text-anchor="start"><tspan x="802" dy="0">Creative spotlight</tspan></text><text x="802" y="1692" fill="#746B64" font-family="Arial" font-size="15" font-weight="400" text-anchor="start"><tspan x="802" dy="0">Artist feature and advocacy campaign</tspan></text><rect x="776" y="1756" width="260" height="122" rx="28" fill="#C96D47" stroke-width="1"/><rect x="794" y="1774" width="224" height="86" rx="22" fill="#FFFDF8" stroke-width="1" opacity="0.18"/><circle cx="966" cy="1816" r="28" fill="#E5C37A" opacity="0.7"/><circle cx="834" cy="1814" r="20" fill="#FFFDF8" opacity="0.55"/><text x="804" y="1842" fill="#FFFDF8" font-family="Arial" font-size="16" font-weight="700" text-anchor="start"><tspan x="804" dy="0">Gallery tile</tspan></text><rect x="1064" y="1756" width="260" height="122" rx="28" fill="#16463F" stroke-width="1"/><rect x="1082" y="1774" width="224" height="86" rx="22" fill="#FFFDF8" stroke-width="1" opacity="0.18"/><circle cx="1254" cy="1816" r="28" fill="#E5C37A" opacity="0.7"/><circle cx="1122" cy="1814" r="20" fill="#FFFDF8" opacity="0.55"/><text x="1092" y="1842" fill="#FFFDF8" font-family="Arial" font-size="16" font-weight="700" text-anchor="start"><tspan x="1092" dy="0">Event tile</tspan></text>
</svg>
